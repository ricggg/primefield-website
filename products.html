    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5d1a;
            --primary-dark: #0d3d0d;
            --primary-light: #3d8b3d;
            --secondary: #f4a024;
            --white: #ffffff;
            --cream: #faf8f5;
            --dark: #1a1a2e;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --gradient-1: linear-gradient(135deg, #1a5d1a 0%, #3d8b3d 100%);
            --gradient-2: linear-gradient(135deg, #f4a024 0%, #f9c74f 100%);
            --gradient-3: linear-gradient(135deg, #2980b9 0%, #6dd5fa 100%);
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; line-height: 1.7; color: var(--dark); background: var(--cream); overflow-x: hidden; }

        .preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--gradient-1); display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s, visibility 0.5s; }
        .preloader.hidden { opacity: 0; visibility: hidden; }
        .preloader-content { text-align: center; color: var(--white); }
        .preloader-logo { margin-bottom: 20px; animation: pulse 1.5s infinite; }
        .preloader-logo img { width: 120px; height: 120px; object-fit: contain; border-radius: 20px; background: var(--white); padding: 10px; }
        .preloader-text { font-size: 1.5rem; font-weight: 700; margin-top: 15px; }
        .loader { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.3); border-top-color: var(--secondary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255,255,255,0.98); box-shadow: var(--shadow); }
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.8rem; font-weight: 800; text-decoration: none; color: var(--primary); }
        .logo-img { width: 55px; height: 55px; object-fit: contain; border-radius: 12px; }
        .logo span { color: var(--secondary); }
        .nav-links { display: flex; list-style: none; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; font-weight: 500; font-size: 0.95rem; color: var(--dark); position: relative; transition: color 0.3s; }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--secondary); transition: width 0.3s; }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .nav-btn { background: var(--gradient-2); color: var(--dark) !important; padding: 12px 28px !important; border-radius: 50px; font-weight: 600 !important; }
        .nav-btn::after { display: none !important; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 30px; height: 3px; background: var(--dark); border-radius: 3px; transition: all 0.3s; }

        .page-hero { padding: 180px 5% 100px; background: linear-gradient(135deg, rgba(26,93,26,0.95) 0%, rgba(13,61,13,0.9) 100%), url('https://images.unsplash.com/photo-1569288052389-dac9b0ac9eac?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80'); background-size: cover; background-position: center; text-align: center; position: relative; }
        .page-hero::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 150px; background: linear-gradient(to top, var(--cream), transparent); }
        .page-hero-content { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
        .page-hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; color: var(--white); margin-bottom: 20px; }
        .page-hero h1 span { color: var(--secondary); }
        .page-hero p { font-size: 1.2rem; color: rgba(255,255,255,0.9); margin-bottom: 30px; }
        .breadcrumb { display: flex; justify-content: center; gap: 15px; align-items: center; }
        .breadcrumb a { color: rgba(255,255,255,0.8); text-decoration: none; }
        .breadcrumb i { color: var(--secondary); font-size: 0.8rem; }
        .breadcrumb span { color: var(--secondary); font-weight: 600; }

        .product-filter { padding: 40px 5%; background: var(--white); border-bottom: 1px solid var(--light-gray); }
        .filter-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .filter-btn { padding: 12px 30px; border: 2px solid var(--light-gray); background: var(--white); border-radius: 50px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
        .filter-btn:hover, .filter-btn.active { background: var(--gradient-1); color: var(--white); border-color: var(--primary); }

        .products-section { padding: 80px 5%; background: var(--cream); }
        .products-container { max-width: 1400px; margin: 0 auto; }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }

        .product-card { background: var(--white); border-radius: 25px; overflow: hidden; transition: all 0.4s; position: relative; }
        .product-card:hover { transform: translateY(-15px); box-shadow: var(--shadow-lg); }
        .product-badge { position: absolute; top: 20px; left: 20px; background: var(--gradient-2); color: var(--dark); padding: 8px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; z-index: 2; }
        .product-badge.new { background: var(--gradient-3); color: var(--white); }
        .product-badge.sale { background: #e74c3c; color: var(--white); }
        .product-image { height: 280px; overflow: hidden; position: relative; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-image img { transform: scale(1.1); }
        .product-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%); opacity: 0; transition: opacity 0.4s; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 20px; }
        .product-card:hover .product-overlay { opacity: 1; }
        .quick-view-btn { padding: 10px 25px; background: var(--white); color: var(--dark); border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
        .quick-view-btn:hover { background: var(--gradient-2); }
        .product-content { padding: 30px; }
        .product-category { color: var(--primary); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .product-title { font-size: 1.4rem; font-weight: 700; color: var(--dark); margin-bottom: 12px; }
        .product-description { color: var(--gray); font-size: 0.95rem; margin-bottom: 20px; line-height: 1.7; }
        .product-features { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .product-feature { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; color: var(--gray); }
        .product-feature i { color: var(--primary); }
        .product-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid var(--light-gray); }
        .product-price { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .product-price span { font-size: 0.85rem; font-weight: 400; color: var(--gray); }
        .product-price .old-price { text-decoration: line-through; color: var(--gray); font-size: 1rem; margin-right: 10px; }
        .add-to-cart-btn { display: flex; align-items: center; gap: 8px; padding: 12px 25px; background: var(--gradient-1); color: var(--white); border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
        .add-to-cart-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(26,93,26,0.3); }

        .wholesale-section { padding: 100px 5%; background: var(--gradient-1); position: relative; overflow: hidden; }
        .wholesale-section::before { content: ''; position: absolute; top: -50%; right: -20%; width: 800px; height: 800px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .wholesale-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; position: relative; z-index: 1; }
        .wholesale-content h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; color: var(--white); margin-bottom: 20px; }
        .wholesale-content h2 span { color: var(--secondary); }
        .wholesale-content p { color: rgba(255,255,255,0.9); font-size: 1.1rem; margin-bottom: 30px; line-height: 1.8; }
        .wholesale-features { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .wholesale-feature { display: flex; align-items: center; gap: 15px; color: var(--white); }
        .wholesale-feature i { width: 40px; height: 40px; background: var(--gradient-2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--dark); }
        .wholesale-image { position: relative; }
        .wholesale-image img { width: 100%; border-radius: 30px; box-shadow: var(--shadow-lg); }
        .wholesale-badge { position: absolute; bottom: -20px; right: -20px; background: var(--gradient-2); color: var(--dark); padding: 25px 35px; border-radius: 20px; text-align: center; box-shadow: var(--shadow); }
        .wholesale-badge h3 { font-size: 2rem; font-weight: 800; }
        .wholesale-badge p { font-size: 0.9rem; margin: 0; }
        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; border-radius: 50px; font-weight: 600; text-decoration: none; transition: all 0.3s; font-size: 1rem; }
        .btn-secondary { background: var(--white); color: var(--dark); }
        .btn-secondary:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }

        .footer { background: var(--dark); color: var(--white); padding-top: 80px; }
        .footer-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 50px; padding-bottom: 60px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .footer-brand .logo { margin-bottom: 25px; color: var(--white); }
        .footer-brand p { color: rgba(255,255,255,0.7); line-height: 1.8; margin-bottom: 25px; }
        .footer-social { display: flex; gap: 15px; }
        .footer-social a { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--white); text-decoration: none; transition: all 0.3s; }
        .footer-social a:hover { background: var(--gradient-2); color: var(--dark); transform: translateY(-5px); }
